identity:
  name: oracle_db_plugin
  author: wilbur2019
  label:
    en_US: "Oracle Database Query"
    zh_Hans: "Oracle数据库查询"
    pt_BR: "Consulta Oracle Database"
description:
  human:
    en_US: "Connect to Oracle database and execute SQL queries using Thin Mode."
    zh_Hans: "使用Thin Mode连接Oracle数据库并执行SQL查询。"
    pt_BR: "Conecte-se ao banco de dados Oracle e execute consultas SQL usando o Modo Thin."
  llm: "A tool for connecting to Oracle database and executing SQL queries using Thin Mode."
parameters:
  - name: connection_type
    type: select
    required: true
    label:
      en_US: Connection Type
      zh_Hans: 连接方式
      pt_BR: Tipo de Conexão
    human_description:
      en_US: "Choose the connection type to Oracle database."
      zh_Hans: "选择连接Oracle数据库的方式。"
      pt_BR: "Escolha o tipo de conexão com o banco de dados Oracle."
    llm_description: "Choose the connection type to Oracle database."
    form: llm
    options:
      - label:
          en_US: Standard (Username/Password)
          zh_Hans: 标准（用户名/密码）
          pt_BR: Padrão (Nome de Usuário/Senha)
        value: standard
      - label:
          en_US: Oracle ADB Wallet
          zh_Hans: Oracle ADB钱包
          pt_BR: Carteira Oracle ADB
        value: wallet
  - name: host
    type: string
    required: false
    label:
      en_US: Database Host
      zh_Hans: 数据库主机
      pt_BR: Host do Banco de Dados
    human_description:
      en_US: "The hostname or IP address of the Oracle database server. (Required for Standard connection)"
      zh_Hans: "Oracle数据库服务器的主机名或IP地址。（标准连接必填）"
      pt_BR: "O hostname ou endereço IP do servidor de banco de dados Oracle. (Obrigatório para conexão padrão)"
    llm_description: "The hostname or IP address of the Oracle database server."
    form: llm
    show_condition:
      field: connection_type
      value: standard
  - name: port
    type: number
    required: false
    label:
      en_US: Database Port
      zh_Hans: 数据库端口
      pt_BR: Porta do Banco de Dados
    human_description:
      en_US: "The port number of the Oracle database server. (Required for Standard connection)"
      zh_Hans: "Oracle数据库服务器的端口号。（标准连接必填）"
      pt_BR: "O número da porta do servidor de banco de dados Oracle. (Obrigatório para conexão padrão)"
    llm_description: "The port number of the Oracle database server."
    form: llm
    show_condition:
      field: connection_type
      value: standard
  - name: user
    type: string
    required: false
    label:
      en_US: Username
      zh_Hans: 用户名
      pt_BR: Nome de Usuário
    human_description:
      en_US: "The username for connecting to the Oracle database. (Required for Standard connection)"
      zh_Hans: "连接Oracle数据库的用户名。（标准连接必填）"
      pt_BR: "O nome de usuário para conectar ao banco de dados Oracle. (Obrigatório para conexão padrão)"
    llm_description: "The username for connecting to the Oracle database."
    form: llm
    show_condition:
      field: connection_type
      value: standard
  - name: password
    type: secret-input
    required: false
    label:
      en_US: Password
      zh_Hans: 密码
      pt_BR: Senha
    human_description:
      en_US: "The password for connecting to the Oracle database. (Required for Standard connection)"
      zh_Hans: "连接Oracle数据库的密码。（标准连接必填）"
      pt_BR: "A senha para conectar ao banco de dados Oracle. (Obrigatório para conexão padrão)"
    llm_description: "The password for connecting to the Oracle database."
    form: llm
    show_condition:
      field: connection_type
      value: standard
  - name: service_name
    type: string
    required: false
    label:
      en_US: Service Name
      zh_Hans: 服务名
      pt_BR: Nome do Serviço
    human_description:
      en_US: "The service name of the Oracle database. (Required for Standard connection)"
      zh_Hans: "Oracle数据库的服务名。（标准连接必填）"
      pt_BR: "O nome do serviço do banco de dados Oracle. (Obrigatório para conexão padrão)"
    llm_description: "The service name of the Oracle database."
    form: llm
    show_condition:
      field: connection_type
      value: standard
  - name: wallet_base64
    type: string
    required: false
    label:
      en_US: Wallet File (Base64)
      zh_Hans: 钱包文件（Base64）
      pt_BR: Arquivo Carteira (Base64)
    human_description:
      en_US: "The base64 encoded content of the Oracle wallet zip file. (Required for ADB Wallet connection)"
      zh_Hans: "Oracle钱包zip文件的base64编码内容。（ADB钱包连接必填）"
      pt_BR: "O conteúdo codificado em base64 do arquivo zip da carteira Oracle. (Obrigatório para conexão Carteira ADB)"
    llm_description: "The base64 encoded content of the Oracle wallet zip file."
    form: llm
    show_condition:
      field: connection_type
      value: wallet
  - name: wallet_password
    type: secret-input
    required: false
    label:
      en_US: Wallet Password
      zh_Hans: 钱包密码
      pt_BR: Senha da Carteira
    human_description:
      en_US: "The password to unlock the Oracle wallet. (Required for ADB Wallet connection)"
      zh_Hans: "解锁Oracle钱包的密码。（ADB钱包连接必填）"
      pt_BR: "A senha para desbloquear a carteira Oracle. (Obrigatório para conexão Carteira ADB)"
    llm_description: "The password to unlock the Oracle wallet."
    form: llm
    show_condition:
      field: connection_type
      value: wallet
  - name: wallet_user
    type: string
    required: false
    label:
      en_US: Wallet Username
      zh_Hans: 钱包用户名
      pt_BR: Nome de Usuário da Carteira
    human_description:
      en_US: "The username for connecting to the Oracle database using wallet. (Required for ADB Wallet connection)"
      zh_Hans: "使用钱包连接Oracle数据库的用户名。（ADB钱包连接必填）"
      pt_BR: "O nome de usuário para conectar ao banco de dados Oracle usando carteira. (Obrigatório para conexão Carteira ADB)"
    llm_description: "The username for connecting to the Oracle database using wallet."
    form: llm
    show_condition:
      field: connection_type
      value: wallet
  - name: tns_name
    type: string
    required: false
    label:
      en_US: TNS Name
      zh_Hans: TNS名称
      pt_BR: Nome TNS
    human_description:
      en_US: "The TNS name configured in the wallet. (Required for ADB Wallet connection)"
      zh_Hans: "钱包中配置的TNS名称。（ADB钱包连接必填）"
      pt_BR: "O nome TNS configurado na carteira. (Obrigatório para conexão Carteira ADB)"
    llm_description: "The TNS name configured in the wallet."
    form: llm
    show_condition:
      field: connection_type
      value: wallet
  - name: query
    type: string
    required: true
    label:
      en_US: SQL Query
      zh_Hans: SQL查询语句
      pt_BR: Consulta SQL
    human_description:
      en_US: "The SQL query to execute against the Oracle database."
      zh_Hans: "要在Oracle数据库上执行的SQL查询语句。"
      pt_BR: "A consulta SQL a ser executada no banco de dados Oracle."
    llm_description: "The SQL query to execute against the Oracle database."
    form: llm
extra:
  python:
    source: tools/oracle_db_plugin.py
